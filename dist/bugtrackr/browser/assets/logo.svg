<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <!-- Hexagon backdrop -->
  <rect x="4" y="4" width="48" height="48" rx="14" fill="url(#iconBg)" opacity="0.15"/>
  <rect x="4" y="4" width="48" height="48" rx="14" stroke="url(#iconBg)" stroke-width="1.5"/>
  <!-- Bug icon (simplified ladybug shape) -->
  <g transform="translate(28, 28)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="12" ry="10" fill="url(#iconBg)"/>
    <!-- Head -->
    <circle cx="0" cy="-10" r="5" fill="url(#iconBg)"/>
    <!-- Antennae -->
    <line x1="-3" y1="-14" x2="-8" y2="-20" stroke="url(#iconBg)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="3" y1="-14" x2="8" y2="-20" stroke="url(#iconBg)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-8" cy="-20" r="1.5" fill="url(#iconBg)"/>
    <circle cx="8" cy="-20" r="1.5" fill="url(#iconBg)"/>
    <!-- Wing line -->
    <line x1="0" y1="-5" x2="0" y2="10" stroke="white" stroke-width="0.8" opacity="0.6"/>
    <!-- Dots -->
    <circle cx="-4" cy="-2" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="4" cy="-2" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="-3" cy="5" r="1" fill="white" opacity="0.8"/>
    <circle cx="3" cy="5" r="1" fill="white" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="66" y="36" font-family="'Inter', 'DM Sans', system-ui, sans-serif" font-size="24" font-weight="800" letter-spacing="-0.5" fill="currentColor">BugTrackr</text>
  <text x="66" y="50" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="3" fill="url(#brand)">BUG TRACKING SYSTEM</text>
</svg>
