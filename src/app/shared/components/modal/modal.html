@if (isOpen) {
  <div 
    class="fixed inset-0 z-[100] flex items-center justify-center p-4 overflow-hidden"
    aria-modal="true"
    role="dialog"
  >
    <!-- Backdrop -->
    <div 
      [@backdrop]
      class="absolute inset-0 bg-black/60 backdrop-blur-sm"
      (click)="onClose()"
      tabindex="0"
      (keydown.enter)="onClose()"
      (keydown.space)="onClose()"
    ></div>

    <!-- Modal Container -->
    <div 
      [@modal]
      class="relative bg-bg-surface border border-border shadow-2xl rounded-2xl w-full max-h-[90vh] flex flex-col overflow-hidden"
      [ngClass]="{
        'max-w-md': size === 'sm',
        'max-w-xl': size === 'md',
        'max-w-3xl': size === 'lg',
        'max-w-5xl': size === 'xl'
      }"
    >
      <!-- Header -->
      <div class="px-6 py-4 border-b border-border flex items-center justify-between bg-bg-elevated/30">
        <h3 class="text-xl font-bold text-text-primary">{{ title }}</h3>
        <button 
          (click)="onClose()"
          class="p-2 rounded-xl text-text-muted hover:text-text-primary hover:bg-bg-hover transition-colors"
        >
          <lucide-icon [name]="X" [size]="20"></lucide-icon>
        </button>
      </div>

      <!-- Content -->
      <div class="flex-1 overflow-y-auto p-6">
        <ng-content></ng-content>
      </div>

      <!-- Footer (Optional projection) -->
      <div class="px-6 py-4 border-t border-border bg-bg-elevated/10">
        <ng-content select="[footer]"></ng-content>
      </div>
    </div>
  </div>
}
