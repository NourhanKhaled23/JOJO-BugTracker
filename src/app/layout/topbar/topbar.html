<header class="h-16 bg-bg-surface border-b border-border flex items-center justify-between px-4 z-20">
  
  <!-- Left Side -->
  <div class="flex items-center gap-4">
    <!-- Mobile Menu / Desktop Collapse -->
    <button 
      (click)="toggleSidebar.emit()"
      class="p-2 -ml-2 rounded-lg text-text-secondary hover:text-text-primary hover:bg-bg-hover transition-colors hidden md:block"
    >
      <lucide-icon name="menu" [size]="20"></lucide-icon>
    </button>

    <!-- Global Search -->
    <button class="flex items-center gap-2 px-3 py-1.5 rounded-md bg-bg-base border border-border text-text-muted hover:border-border-strong hover:text-text-primary transition-colors group">
      <lucide-icon name="search" [size]="16"></lucide-icon>
      <span class="text-sm">Search...</span>
      <div class="hidden sm:flex items-center gap-1 ml-4 px-1.5 py-0.5 rounded bg-bg-elevated border border-border group-hover:border-border-strong transition-colors text-[10px] font-medium tracking-wider uppercase">
        <kbd>Cmd</kbd> <kbd>K</kbd>
      </div>
    </button>
  </div>

  <!-- Right Side -->
  <div class="flex items-center gap-2 sm:gap-4">
    
    <!-- Notifications -->
    <button class="p-2 rounded-full text-text-secondary hover:text-text-primary hover:bg-bg-hover transition-colors relative">
      <lucide-icon name="bell" [size]="20"></lucide-icon>
      <span class="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-error"></span>
    </button>

    <div class="w-px h-6 bg-border mx-1"></div>

    <!-- User Menu -->
    <div class="relative">
      <button 
        (click)="toggleUserMenu()"
        class="flex items-center gap-2 p-1 rounded-full hover:bg-bg-hover transition-colors focus:outline-none"
      >
        <div class="w-8 h-8 rounded-full bg-accent-subtle flex items-center justify-center overflow-hidden">
          @if (user?.avatarUrl) {
            <img [src]="user?.avatarUrl" [alt]="user?.fullName" class="w-full h-full object-cover">
          } @else {
            <span class="text-accent text-sm font-bold">{{ user?.fullName?.charAt(0) || 'U' }}</span>
          }
        </div>
      </button>

      <!-- Dropdown -->
      @if (showUserMenu) {
        <div class="absolute right-0 mt-2 w-48 rounded-xl bg-bg-elevated border border-border shadow-lg py-1 z-50 animate-in fade-in slide-in-from-top-2 duration-200">
          <div class="px-4 py-2 border-b border-border">
            <p class="text-sm font-medium text-text-primary truncate">{{ user?.fullName || 'User' }}</p>
            <p class="text-xs text-text-muted truncate">{{ user?.email || 'user@example.com' }}</p>
          </div>
          <button class="w-full text-left px-4 py-2 text-sm text-text-secondary hover:text-text-primary hover:bg-bg-hover flex items-center gap-2 transition-colors">
            <lucide-icon name="user" [size]="16"></lucide-icon>
            Profile
          </button>
          <button 
            (click)="logout()"
            class="w-full text-left px-4 py-2 text-sm text-error hover:bg-error/10 flex items-center gap-2 transition-colors"
          >
            <lucide-icon name="log-out" [size]="16"></lucide-icon>
            Log out
          </button>
        </div>
      }
    </div>
  </div>
</header>
