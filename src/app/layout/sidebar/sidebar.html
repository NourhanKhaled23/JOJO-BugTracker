<aside 
  class="h-full bg-bg-surface border-r border-border transition-all duration-300 flex flex-col"
  [class.w-64]="!isCollapsed"
  [class.w-20]="isCollapsed"
>
  <!-- Logo Area -->
  <div class="h-16 flex items-center px-4 border-b border-border">
    <div class="flex items-center gap-3 overflow-hidden">
      <div class="w-10 h-10 rounded-xl bg-accent flex items-center justify-center flex-shrink-0 text-white">
        <lucide-icon name="bug" [size]="24"></lucide-icon>
      </div>
      <span 
        class="font-display font-bold text-xl text-text-primary whitespace-nowrap transition-opacity duration-200"
        [class.opacity-0]="isCollapsed"
        [class.w-0]="isCollapsed"
      >
        BugTrackr
      </span>
    </div>
  </div>

  <!-- Main Navigation -->
  <div class="flex-1 overflow-y-auto py-6 px-3 flex flex-col gap-2">
    @for (item of navItems; track item.route) {
      <a 
        [routerLink]="item.route" 
        routerLinkActive="bg-accent-subtle text-accent font-medium"
        [routerLinkActiveOptions]="{exact: item.exact}"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-secondary hover:text-text-primary hover:bg-bg-hover transition-colors overflow-hidden group"
        [title]="isCollapsed ? item.label : ''"
      >
        <lucide-icon [name]="item.icon" [size]="20" class="flex-shrink-0"></lucide-icon>
        <span 
          class="whitespace-nowrap transition-opacity duration-200"
          [class.opacity-0]="isCollapsed"
          [class.w-0]="isCollapsed"
        >
          {{ item.label }}
        </span>
      </a>
    }

    <!-- Pinned Projects (Example) -->
    <div class="mt-8 mb-2 px-3" [class.hidden]="isCollapsed">
      <span class="text-xs font-semibold text-text-muted uppercase tracking-wider">Pinned</span>
    </div>
    
    <a 
      href="#" (click)="$event.preventDefault()"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-text-secondary hover:text-text-primary hover:bg-bg-hover transition-colors overflow-hidden"
      [class.hidden]="isCollapsed"
    >
      <div class="w-2 h-2 rounded-full bg-success flex-shrink-0"></div>
      <span class="whitespace-nowrap truncate text-sm">Graduation Project</span>
    </a>
  </div>

  <!-- Settings Nav -->
  <div class="p-3 border-t border-border">
    <a 
      routerLink="/settings" 
      routerLinkActive="bg-accent-subtle text-accent font-medium"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-secondary hover:text-text-primary hover:bg-bg-hover transition-colors overflow-hidden"
      [title]="isCollapsed ? 'Settings' : ''"
    >
      <lucide-icon name="settings" [size]="20" class="flex-shrink-0"></lucide-icon>
      <span 
        class="whitespace-nowrap transition-opacity duration-200"
        [class.opacity-0]="isCollapsed"
        [class.w-0]="isCollapsed"
      >
        Settings
      </span>
    </a>
  </div>
</aside>
