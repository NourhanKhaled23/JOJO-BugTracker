<div class="h-screen flex flex-col bg-bg-base overflow-hidden">

  <!-- Topbar (now includes nav) -->
  <app-topbar class="flex-shrink-0 z-50"></app-topbar>

  <!-- Global Progress Bar -->
  <div class="h-1 w-full bg-transparent overflow-hidden relative flex-shrink-0">
    <div 
      class="absolute inset-0 bg-accent transition-all duration-500 ease-in-out"
      [class.w-0]="!store.isLoading()"
      [class.w-full]="store.isLoading()"
      [class.animate-pulse]="store.isLoading()"
    ></div>
  </div>

  <!-- Page content -->
  <main class="flex-1 overflow-y-auto">
    <router-outlet></router-outlet>
  </main>

  <!-- Global Toasts -->
  <div class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3 pointer-events-none">
    @for (toast of toastService.toasts(); track toast.id) {
      <div
        class="pointer-events-auto flex items-center gap-3 px-5 py-3 rounded-2xl shadow-2xl border glass animate-in slide-in-from-right duration-300"
        [class.border-success/20]="toast.type === 'success'"
        [class.bg-success/10]="toast.type === 'success'"
        [class.text-success]="toast.type === 'success'"
        [class.border-error/20]="toast.type === 'error'"
        [class.bg-error/10]="toast.type === 'error'"
        [class.text-error]="toast.type === 'error'"
        [class.border-info/20]="toast.type === 'info'"
        [class.bg-info/10]="toast.type === 'info'"
        [class.text-info]="toast.type === 'info'"
        [class.border-warning/20]="toast.type === 'warning'"
        [class.bg-warning/10]="toast.type === 'warning'"
        [class.text-warning]="toast.type === 'warning'"
      >
        <lucide-icon
          [name]="toast.type === 'success' ? CheckCircle2 : toast.type === 'error' ? AlertCircle : toast.type === 'warning' ? AlertTriangle : Info"
          [size]="18">
        </lucide-icon>
        <span class="text-sm font-bold tracking-tight">{{ toast.message }}</span>
      </div>
    }
  </div>

  @defer (on idle) {
    <app-performance-overlay />
  }
  @defer (on idle) {
    <app-command-palette />
  }
</div>
