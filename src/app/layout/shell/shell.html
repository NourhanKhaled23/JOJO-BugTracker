<div class="h-screen flex bg-bg-base overflow-hidden">
  
  <!-- Sidebar -->
  <app-sidebar 
    [isCollapsed]="isSidebarCollapsed" 
    class="hidden md:flex flex-shrink-0 z-20"
  ></app-sidebar>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative z-10">
    
    <!-- Topbar -->
    <app-topbar (toggleSidebar)="toggleSidebar()"></app-topbar>
    
    <!-- Page wrapper -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8">
      <div class="max-w-7xl mx-auto h-full">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-bg-elevated border-t border-border z-30 flex justify-around items-center px-4">
    <a routerLink="/dashboard" routerLinkActive="text-accent" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center gap-1 text-text-muted hover:text-text-primary p-2">
      <lucide-icon name="layout-dashboard" [size]="20"></lucide-icon>
      <span class="text-[10px] font-medium">Dashboard</span>
    </a>
    <a routerLink="/projects" routerLinkActive="text-accent" class="flex flex-col items-center gap-1 text-text-muted hover:text-text-primary p-2">
      <lucide-icon name="folder-kanban" [size]="20"></lucide-icon>
      <span class="text-[10px] font-medium">Projects</span>
    </a>
    <a routerLink="/bugs" routerLinkActive="text-accent" class="flex flex-col items-center gap-1 text-text-muted hover:text-text-primary p-2">
      <lucide-icon name="bug" [size]="20"></lucide-icon>
      <span class="text-[10px] font-medium">Issues</span>
    </a>
    <a routerLink="/settings" routerLinkActive="text-accent" class="flex flex-col items-center gap-1 text-text-muted hover:text-text-primary p-2">
      <lucide-icon name="settings" [size]="20"></lucide-icon>
      <span class="text-[10px] font-medium">Settings</span>
    </a>
  </nav>

</div>
