<div class="h-screen flex bg-bg-base overflow-hidden">
  
  <!-- Sidebar -->
  <app-sidebar 
    [isCollapsed]="isSidebarCollapsed" 
    class="hidden md:flex flex-shrink-0 z-20"
  ></app-sidebar>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative z-10">
    
    <!-- Topbar -->
    <app-topbar class="relative z-50 block" (toggleSidebar)="toggleSidebar()"></app-topbar>
    
    <!-- Global Progress Bar -->
    <div class="h-1 w-full bg-transparent overflow-hidden relative">
      <div 
        class="absolute inset-0 bg-accent transition-all duration-500 ease-in-out"
        [class.w-0]="!store.isLoading()"
        [class.w-full]="store.isLoading()"
        [class.animate-pulse]="store.isLoading()"
      ></div>
    </div>
    
    <!-- Page wrapper -->

    <main class="flex-1 overflow-y-auto">
      <router-outlet></router-outlet>
    </main>
    <!-- Global Toasts -->
  <div class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3 pointer-events-none">
    @for (toast of toastService.toasts(); track toast.id) {
      <div
        class="pointer-events-auto flex items-center gap-3 px-5 py-3 rounded-2xl shadow-2xl border glass animate-in slide-in-from-right duration-300"
        [class.border-success/20]="toast.type === 'success'"
        [class.bg-success/10]="toast.type === 'success'"
        [class.text-success]="toast.type === 'success'"
        [class.border-error/20]="toast.type === 'error'"
        [class.bg-error/10]="toast.type === 'error'"
        [class.text-error]="toast.type === 'error'"
        [class.border-info/20]="toast.type === 'info'"
        [class.bg-info/10]="toast.type === 'info'"
        [class.text-info]="toast.type === 'info'"
        [class.border-warning/20]="toast.type === 'warning'"
        [class.bg-warning/10]="toast.type === 'warning'"
        [class.text-warning]="toast.type === 'warning'"
      >
        <lucide-icon
          [name]="toast.type === 'success' ? CheckCircle2 : toast.type === 'error' ? AlertCircle : toast.type === 'warning' ? AlertTriangle : Info"
          [size]="18">
        </lucide-icon>
        <span class="text-sm font-bold tracking-tight">{{ toast.message }}</span>
      </div>
    }
  </div>

  <app-performance-overlay></app-performance-overlay>
  <app-command-palette></app-command-palette>
</div>



  <!-- Mobile Bottom Nav -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-bg-elevated border-t border-border z-30 flex justify-around items-center px-2">
    <a routerLink="/dashboard" routerLinkActive="text-accent" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center gap-0.5 text-text-muted hover:text-text-primary p-2 min-w-0">
      <lucide-icon [name]="LayoutDashboard" [size]="20"></lucide-icon>
      <span class="text-[9px] font-medium">Home</span>
    </a>
    <a routerLink="/projects" routerLinkActive="text-accent" class="flex flex-col items-center gap-0.5 text-text-muted hover:text-text-primary p-2 min-w-0">
      <lucide-icon [name]="FolderKanban" [size]="20"></lucide-icon>
      <span class="text-[9px] font-medium">Projects</span>
    </a>
    <a routerLink="/bugs" routerLinkActive="text-accent" class="flex flex-col items-center gap-0.5 text-text-muted hover:text-text-primary p-2 min-w-0">
      <lucide-icon [name]="Bug" [size]="20"></lucide-icon>
      <span class="text-[9px] font-medium">Issues</span>
    </a>
    <a routerLink="/members" routerLinkActive="text-accent" class="flex flex-col items-center gap-0.5 text-text-muted hover:text-text-primary p-2 min-w-0">
      <lucide-icon [name]="Users" [size]="20"></lucide-icon>
      <span class="text-[9px] font-medium">Team</span>
    </a>
    <a routerLink="/settings" routerLinkActive="text-accent" class="flex flex-col items-center gap-0.5 text-text-muted hover:text-text-primary p-2 min-w-0">
      <lucide-icon [name]="Settings" [size]="20"></lucide-icon>
      <span class="text-[9px] font-medium">Settings</span>
    </a>
  </nav>

</div>
